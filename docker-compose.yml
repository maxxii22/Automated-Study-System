services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: study_sphere
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d study_sphere" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: [ "redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction" ]
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.server
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 4000
      CLIENT_ORIGIN: http://localhost:5173
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_ADMIN_USER_IDS: ${SUPABASE_ADMIN_USER_IDS:-}
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/study_sphere?schema=public
      DIRECT_URL: postgresql://postgres:postgres@postgres:5432/study_sphere?schema=public
      REDIS_URL: redis://redis:6379
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      ENABLE_LOCAL_OBJECT_STORAGE_FALLBACK: ${ENABLE_LOCAL_OBJECT_STORAGE_FALLBACK:-false}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    ports:
      - "4000:4000"
    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://127.0.0.1:4000/api/ready').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))" ]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/study_sphere?schema=public
      DIRECT_URL: postgresql://postgres:postgres@postgres:5432/study_sphere?schema=public
      REDIS_URL: redis://redis:6379
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      ENABLE_LOCAL_OBJECT_STORAGE_FALLBACK: ${ENABLE_LOCAL_OBJECT_STORAGE_FALLBACK:-false}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    depends_on:
      api:
        condition: service_healthy
    environment:
      VITE_API_BASE_URL: http://localhost:4000/api
      VITE_SOCKET_URL: http://localhost:4000
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    ports:
      - "5173:4173"
    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://127.0.0.1:4173').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))" ]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
